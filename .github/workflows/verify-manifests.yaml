name: Verify Manifests
on:
  pull_request:
    branches: [main]
    paths:
      - "pkg/apis/**"
      - "operator/config/**"
      - "operator/streams/**"
      - "operator/roles/**"

jobs:
  verify-manifests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Run make update-manifests
        run: make update-manifests

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated manifests are out of date. Please run 'make update-manifests' and commit the changes."
            echo ""
            echo "Changed files:"
            git status --short
            echo ""
            echo "Diff:"
            git diff
            exit 1
          fi
          echo "Manifests are up to date."
