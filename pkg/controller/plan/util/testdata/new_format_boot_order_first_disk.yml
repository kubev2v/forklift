---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-vm-boot-order-first
spec:
  template:
    spec:
      domain:
        devices:
          disks:
            - name: disk-0
              bootOrder: 1
              disk:
                bus: virtio
            - name: disk-1
              bootOrder: 2
              disk:
                bus: virtio
