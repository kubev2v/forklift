---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: hooks.forklift.konveyor.io
spec:
  group: forklift.konveyor.io
  names:
    kind: Hook
    listKind: HookList
    plural: hooks
    singular: hook
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.image
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Hook is the Schema for the hooks API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Hook specification.
              Local hooks require spec.image (playbook is optional if the image runs without an injected playbook).
              AAP hooks require spec.aap (image/playbook omitted for execution).
              Whether the spec is valid for execution is enforced by the hook and plan controllers (not by CRD admission rules).
            properties:
              aap:
                description: |-
                  AAP (Ansible Automation Platform) configuration for remote job execution.
                  When specified, the hook will trigger an AAP job template instead of running a local playbook.
                properties:
                  jobTemplateId:
                    description: ID of the AAP job template to execute.
                    type: integer
                  timeout:
                    description: |-
                      Timeout in seconds to wait for the AAP job after launch (wall-clock polling limit).
                      Default when omitted or 0: first use HookSpec.deadline if it is > 0; otherwise 3600 seconds (1 hour).
                      Any negative value: wait without a wall-clock limit until the job finishes or fails.
                    format: int64
                    type: integer
                  tokenSecret:
                    description: |-
                      Reference to the Secret containing the AAP API token.
                      The Secret must contain a key named "token" with the Bearer token value.
                      If Namespace is empty, the Secret is read from the migration plan namespace.
                    properties:
                      apiVersion:
                        description: API version of the referent.
                        type: string
                      fieldPath:
                        description: |-
                          If referring to a piece of an object instead of an entire object, this string
                          should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                          For example, if the object reference is to a container within a pod, this would take on a value like:
                          "spec.containers{name}" (where "name" refers to the name of the container that triggered
                          the event) or if no container name is specified "spec.containers[2]" (container with
                          index 2 in this pod). This syntax is chosen only to have some well-defined way of
                          referencing a part of an object.
                        type: string
                      kind:
                        description: |-
                          Kind of the referent.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                        type: string
                      name:
                        description: |-
                          Name of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                        type: string
                      namespace:
                        description: |-
                          Namespace of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                        type: string
                      resourceVersion:
                        description: |-
                          Specific resourceVersion to which this reference is made, if any.
                          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                        type: string
                      uid:
                        description: |-
                          UID of the referent.
                          More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                        type: string
                    type: object
                    x-kubernetes-map-type: atomic
                  url:
                    description: URL of the AAP instance (e.g., "https://aap.example.com").
                    type: string
                required:
                - jobTemplateId
                - tokenSecret
                - url
                type: object
              deadline:
                description: Hook deadline in seconds.
                format: int64
                type: integer
              image:
                description: Image to run the hook workload (required for local hooks;
                  omit for AAP hooks).
                type: string
              playbook:
                description: A base64 encoded Ansible playbook (optional for local
                  hooks; when set, ansible-runner is used).
                type: string
              serviceAccount:
                description: Service account.
                type: string
            type: object
          status:
            description: Hook status.
            properties:
              conditions:
                description: List of conditions.
                items:
                  description: Condition
                  properties:
                    category:
                      description: The condition category.
                      type: string
                    durable:
                      description: The condition is durable - never un-staged.
                      type: boolean
                    items:
                      description: A list of items referenced in the `Message`.
                      items:
                        type: string
                      type: array
                    lastTransitionTime:
                      description: When the last status transition occurred.
                      format: date-time
                      type: string
                    message:
                      description: The human readable description of the condition.
                      type: string
                    reason:
                      description: The reason for the condition or transition.
                      type: string
                    status:
                      description: The condition status [true,false].
                      type: string
                    suggestion:
                      description: A suggested action or resolution for the condition.
                      type: string
                    type:
                      description: The condition type.
                      type: string
                  required:
                  - category
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: The most recent generation observed by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
